# Theme Configuration
theme:
  title: "bold cyan"  # H1
  heading_h2: "bold dark_orange"  # H2
  heading_h3: "bold yellow"  # H3
  heading_h4: "bold bright_white"  # H4+
  code: "green"
  bg: "#252525"
  quote: "italic dim"
  list_bullet: "cyan"
  progress_done: "grey23"
  progress_todo: "grey15"

# Key Bindings
keys:
  next_slide: "right"
  prev_slide: "left"
  next_slide_alt: "space"
  first_slide: "home"
  last_slide: "end"
  goto: "g"
  search: "slash"
  overview: "o"
  notes: "n"
  help: "h"
  quit: "q"

# Display Settings
show_line_numbers: false
show_progress: true
code_highlight: true

# Animation Settings
enable_animations: true
animation_duration: 1.0
transition_type: "fall"

# Presentation area dimensions
# Set to null or omit for auto (full screen)
display_width: 90
display_height: 35
